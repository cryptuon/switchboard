site_name: ChainSync Documentation
site_description: Unified Cross-Chain State Synchronization Platform - Deploy once, sync everywhere
site_author: ChainSync Team
site_url: https://docs.cryptuon.com/switchboard/

repo_name: cryptuon/switchboard
repo_url: https://github.com/cryptuon/switchboard
edit_uri: edit/main/documentation/docs/

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/favicon.ico

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)'
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chainsync
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/chainsync
    - icon: fontawesome/brands/discord
      link: https://discord.gg/chainsync
  generator: false
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Quick Start: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - First Deployment: getting-started/first-deployment.md
  - Architecture:
    - architecture/index.md
    - 2-Service Architecture: architecture/two-service-architecture.md
    - Solana Coordination: architecture/solana-coordination.md
    - Supported Chains: architecture/supported-chains.md
  - SDK:
    - sdk/index.md
    - Installation: sdk/installation.md
    - Core Methods: sdk/core-methods.md
    - Examples: sdk/examples.md
  - API Reference:
    - api/index.md
    - Authentication: api/authentication.md
    - Endpoints: api/endpoints.md
  - Deployment:
    - deployment/index.md
    - Docker: deployment/docker.md
    - Production: deployment/production.md
    - Cloud Providers: deployment/cloud.md
  - Configuration:
    - configuration/index.md
    - Environment Variables: configuration/environment.md
    - Database: configuration/database.md
    - Networks: configuration/networks.md
  - Examples:
    - examples/index.md
    - Token Deployment: examples/token.md
    - DeFi Protocol: examples/defi.md
    - NFT Collection: examples/nft.md
  - Development:
    - development/index.md
    - Contributing: development/contributing.md
    - Testing: development/testing.md
  - Support:
    - support/index.md
    - Troubleshooting: support/troubleshooting.md
    - FAQ: support/faq.md

