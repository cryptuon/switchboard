version: '3.8'

services:
  # MongoDB for primary storage
  mongodb:
    image: mongo:7.0
    container_name: chainsync-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: chainsync
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-chainsync123}
      MONGO_INITDB_DATABASE: chainsync
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./config/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - chainsync-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/chainsync --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  # ClickHouse for analytics and events
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: chainsync-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: chainsync_analytics
      CLICKHOUSE_USER: chainsync
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse123}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - chainsync-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: chainsync-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chainsync-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL for relational data (alternative to MongoDB)
  postgresql:
    image: postgres:15
    container_name: chainsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: chainsync
      POSTGRES_USER: chainsync
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - chainsync-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chainsync -d chainsync"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - postgres

  # Core Engine Service - Backend processing (oracle, sync, billing)
  core-engine:
    build:
      context: .
      dockerfile: packages/services/core-engine/Dockerfile
    container_name: chainsync-core-engine
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # Service configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - SERVICE_NAME=core-engine
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Database configuration (choose mongodb or postgresql)
      - DATABASE_TYPE=${DATABASE_TYPE:-mongodb}
      - MONGODB_URL=mongodb://chainsync:${MONGODB_PASSWORD:-chainsync123}@mongodb:27017/chainsync
      - POSTGRES_URL=postgres://chainsync:${POSTGRES_PASSWORD:-postgres123}@postgresql:5432/chainsync

      # Solana configuration
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      - SOLANA_PRIVATE_KEY=${SOLANA_PRIVATE_KEY}

      # Chain RPC URLs
      - ETHEREUM_RPC_URL=${ETHEREUM_RPC_URL:-https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}}
      - POLYGON_RPC_URL=${POLYGON_RPC_URL:-https://polygon-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}}
      - ARBITRUM_RPC_URL=${ARBITRUM_RPC_URL:-https://arb-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}}
      - OPTIMISM_RPC_URL=${OPTIMISM_RPC_URL:-https://opt-mainnet.g.alchemy.com/v2/${ALCHEMY_API_KEY}}
      - BSC_RPC_URL=${BSC_RPC_URL:-https://bsc-dataseed1.binance.org}
      - AVALANCHE_RPC_URL=${AVALANCHE_RPC_URL:-https://api.avax.network/ext/bc/C/rpc}

      # Streaming configuration
      - STREAMING_ENABLED=${STREAMING_ENABLED:-true}
      - COORDINATION_LATENCY_TARGET=${COORDINATION_LATENCY_TARGET:-400}
      - BATCH_PROCESSING_SIZE=${BATCH_PROCESSING_SIZE:-50}
      - MAX_CONCURRENT_CHAINS=${MAX_CONCURRENT_CHAINS:-100}

      # Analytics connections
      - CLICKHOUSE_URL=http://chainsync:${CLICKHOUSE_PASSWORD:-clickhouse123}@clickhouse:8123/chainsync_analytics
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379

      # Stripe configuration
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLIC_KEY=${STRIPE_PUBLIC_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}

      # Monitoring
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-true}
      - METRICS_PORT=9090
    depends_on:
      mongodb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chainsync-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Customer API Service - Customer-facing interface
  customer-api:
    build:
      context: .
      dockerfile: packages/services/customer-api/Dockerfile
    container_name: chainsync-customer-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Service configuration
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - SERVICE_NAME=customer-api
      - LOG_LEVEL=${LOG_LEVEL:-info}

      # Core Engine integration
      - CORE_ENGINE_URL=http://core-engine:3001

      # Database configuration (choose mongodb or postgresql)
      - DATABASE_TYPE=${DATABASE_TYPE:-mongodb}
      - MONGODB_URL=mongodb://chainsync:${MONGODB_PASSWORD:-chainsync123}@mongodb:27017/chainsync
      - POSTGRES_URL=postgres://chainsync:${POSTGRES_PASSWORD:-postgres123}@postgresql:5432/chainsync

      # Security configuration
      - JWT_SECRET=${JWT_SECRET}
      - API_RATE_LIMIT=${API_RATE_LIMIT:-100}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,https://app.chainsync.dev}

      # Redis for caching
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis123}@redis:6379
    depends_on:
      core-engine:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chainsync-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: chainsync-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - chainsync-network
    depends_on:
      - core-engine
      - customer-api

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: chainsync-grafana
    restart: unless-stopped
    ports:
      - "3333:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - chainsync-network
    depends_on:
      - prometheus
      - clickhouse

volumes:
  mongodb_data:
    driver: local
  postgres_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  chainsync-network:
    driver: bridge
    name: chainsync-network