[package]
name = "coordinator"
version = "0.1.0"
description = "Switchboard Coordinator Program"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.31.1"
anchor-spl = "0.31.1"
state-oracle = { path = "../state-oracle", features = ["cpi"] }

[dev-dependencies]
solana-program-test = "2.1.0"
solana-sdk = "2.1.0"