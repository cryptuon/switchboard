[package]
name = "state-oracle"
version = "0.1.0"
description = "Switchboard State Oracle Program"
edition = "2021"
homepage = "https://switchboard.cryptuon.com/"
documentation = "https://docs.cryptuon.com/switchboard/"
repository = "https://github.com/cryptuon/switchboard"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.31.1"
anchor-spl = "0.31.1"
hex = "0.4.3"

[dev-dependencies]
solana-program-test = "2.1.0"
solana-sdk = "2.1.0"