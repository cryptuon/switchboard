[workspace]
members = [
    "state-oracle",
    "coordinator",
    "test-simple"
]
resolver = "2"

[profile.release]
overflow-checks = true
lto = "fat"
codegen-units = 1
[profile.release.build-override]
opt-level = 3
incremental = false
codegen-units = 1

[workspace.metadata.workspaces]
allow_branch = "main"