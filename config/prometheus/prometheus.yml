# Switchboard Prometheus Configuration
# Comprehensive monitoring for Switchboard microservices

global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds
  evaluation_interval: 15s # Evaluate rules every 15 seconds
  scrape_timeout: 10s

  # Attach these labels to any time series or alerts when communicating with
  # external systems (federation, remote storage, Alertmanager).
  external_labels:
    cluster: 'switchboard-production'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
scrape_configs:
  # Switchboard API Service
  - job_name: 'switchboard-api'
    static_configs:
      - targets: ['api-service:3000']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

    # Service-specific labels
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: api-service:3000
      - target_label: service
        replacement: 'api-service'
      - target_label: component
        replacement: 'api'

  # Switchboard Oracle Service (Real-time streaming)
  - job_name: 'switchboard-oracle'
    static_configs:
      - targets: ['oracle-service:3001']
    scrape_interval: 10s # More frequent for real-time metrics
    metrics_path: /metrics
    scheme: http

    relabel_configs:
      - target_label: service
        replacement: 'oracle-service'
      - target_label: component
        replacement: 'oracle'

    # Custom metric relabeling for oracle-specific metrics
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'chainsync_coordination_latency.*'
        target_label: critical_metric
        replacement: 'true'

  # Switchboard Sync Service (Cross-chain coordination)
  - job_name: 'switchboard-sync'
    static_configs:
      - targets: ['sync-service:3002']
    scrape_interval: 15s
    metrics_path: /metrics
    scheme: http

    relabel_configs:
      - target_label: service
        replacement: 'sync-service'
      - target_label: component
        replacement: 'sync'

  # MongoDB Exporter (Database monitoring)
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb:27017']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http

    relabel_configs:
      - target_label: service
        replacement: 'mongodb'
      - target_label: component
        replacement: 'database'

    # MongoDB connection might need authentication
    # basic_auth:
    #   username: mongodb_exporter
    #   password: password

  # Redis Exporter (Cache monitoring)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http

    relabel_configs:
      - target_label: service
        replacement: 'redis'
      - target_label: component
        replacement: 'cache'

  # ClickHouse Exporter (Analytics database)
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:8123']
    scrape_interval: 30s
    metrics_path: /metrics
    scheme: http

    relabel_configs:
      - target_label: service
        replacement: 'clickhouse'
      - target_label: component
        replacement: 'analytics'

  # Node Exporter (System metrics - if deployed)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

    relabel_configs:
      - target_label: service
        replacement: 'node-exporter'
      - target_label: component
        replacement: 'system'

  # Docker container metrics (cAdvisor - if deployed)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s

    relabel_configs:
      - target_label: service
        replacement: 'cadvisor'
      - target_label: component
        replacement: 'container'

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

    relabel_configs:
      - target_label: service
        replacement: 'prometheus'
      - target_label: component
        replacement: 'monitoring'

# Recording rules for performance optimization
# rule_files:
#   - "/etc/prometheus/rules/*.yml"

# Sample recording rules (uncomment and customize as needed)
# groups:
#   - name: chainsync_performance
#     rules:
#       - record: switchboard:coordination_latency:rate5m
#         expr: rate(chainsync_coordination_latency_seconds_sum[5m]) / rate(chainsync_coordination_latency_seconds_count[5m])
#
#       - record: switchboard:deployment_success_rate:5m
#         expr: rate(chainsync_deployments_successful_total[5m]) / rate(chainsync_deployments_total[5m])
#
#       - record: switchboard:api_request_rate:5m
#         expr: rate(http_requests_total{service="api-service"}[5m])

# Storage configuration for long-term retention
storage:
  tsdb:
    retention.time: 30d
    retention.size: 10GB

# Remote storage configuration (for long-term storage)
# remote_write:
#   - url: "https://your-remote-storage/api/v1/write"
#     basic_auth:
#       username: username
#       password: password

# Global limits
global:
  # How frequently to scrape targets by default
  scrape_interval: 15s
  # How long until a scrape request times out
  scrape_timeout: 10s
  # How frequently to evaluate rules
  evaluation_interval: 15s

  # Labels to add to all metrics
  external_labels:
    monitor: 'switchboard-prometheus'
    environment: '${ENVIRONMENT:-production}'
    cluster: 'switchboard-cluster'