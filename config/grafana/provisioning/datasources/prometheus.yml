# Grafana Datasource Configuration
# Connects Grafana to Prometheus and ClickHouse for comprehensive monitoring

apiVersion: 1

datasources:
  # Prometheus - Primary metrics datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    version: 1

    jsonData:
      # Prometheus-specific settings
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.40.0"
      cacheLevel: 'High'
      incrementalQuerying: true
      incrementalQueryOverlapWindow: '10m'

      # Custom headers (if needed)
      # httpHeaderName1: "X-Custom-Header"

    # Authentication (if Prometheus has auth)
    # basicAuth: true
    # basicAuthUser: prometheus
    # secureJsonData:
    #   basicAuthPassword: password

  # ClickHouse - Analytics datasource for event data
  - name: ClickHouse
    type: clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    database: chainsync_analytics
    isDefault: false
    editable: true
    version: 1

    jsonData:
      # ClickHouse-specific settings
      defaultDatabase: chainsync_analytics
      useTLS: false
      useCompression: true

      # Connection settings
      dialTimeout: 10
      maxOpenConns: 10
      maxIdleConns: 10
      connMaxLifetime: 14400

      # Query settings
      addCorsHeader: true
      useDefaultValues: false

    # ClickHouse authentication
    basicAuth: true
    basicAuthUser: switchboard
    secureJsonData:
      basicAuthPassword: "${CLICKHOUSE_PASSWORD:-clickhouse123}"

  # MongoDB - Application database (via MongoDB exporter)
  - name: MongoDB
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: true
    version: 1

    jsonData:
      # Filter to MongoDB metrics only
      httpMethod: GET
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger

    # Custom query to filter MongoDB metrics
    # This uses Prometheus but filters to MongoDB-specific metrics
    uid: mongodb-metrics

  # Loki - Log aggregation (if deployed)
  # - name: Loki
  #   type: loki
  #   access: proxy
  #   url: http://loki:3100
  #   isDefault: false
  #   editable: true
  #   version: 1

  #   jsonData:
  #     maxLines: 1000
