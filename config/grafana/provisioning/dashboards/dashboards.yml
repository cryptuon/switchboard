# Grafana Dashboard Provisioning Configuration
# Automatically loads Switchboard monitoring dashboards

apiVersion: 1

providers:
  # Switchboard dashboard provider
  - name: 'switchboard-dashboards'
    orgId: 1
    folder: 'Switchboard'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

  # System monitoring dashboards
  - name: 'system-dashboards'
    orgId: 1
    folder: 'System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/system