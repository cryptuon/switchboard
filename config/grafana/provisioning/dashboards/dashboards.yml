# Grafana Dashboard Provisioning Configuration
# Automatically loads ChainSync monitoring dashboards

apiVersion: 1

providers:
  # ChainSync dashboard provider
  - name: 'chainsync-dashboards'
    orgId: 1
    folder: 'ChainSync'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards

  # System monitoring dashboards
  - name: 'system-dashboards'
    orgId: 1
    folder: 'System'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/system